<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Media Converter & Compressor (Cloud Powered)</title>
  <style>
    body { font-family: system-ui, Segoe UI, Helvetica, Arial; background: #f3f4f6; margin: 24px; }
    .card { max-width: 920px; margin: 0 auto; background: #fff; padding: 20px; border-radius: 12px; box-shadow: 0 6px 18px rgba(15,23,42,.06); }
    .drop { border: 2px dashed #cbd5e1; padding: 30px; text-align: center; border-radius: 8px; cursor: pointer; background: #fbfdff; transition: border-color 0.2s; }
    .drop:hover { border-color: #94a3b8; }
    .terminal { background: #071020; color: #cbd5e1; padding: 12px; border-radius: 8px; max-height: 240px; overflow: auto; font-family: monospace; font-size: 13px; }
    .btn { padding: 10px 18px; border-radius: 8px; border: none; background: #2563eb; color: white; cursor: pointer; font-weight: 500; }
    .btn:disabled { background: #94a3b8; cursor: not-allowed; }
    .hidden { display: none; }
    .progressWrap { height: 10px; background: #e6eefc; border-radius: 6px; overflow: hidden; }
    .progress { height: 100%; width: 0; background: #2563eb; transition: width .3s ease; }
    .log-info { color: #7dd3fc; }
    .log-error { color: #ff7675; }
    .log-success { color: #86efac; }
    #fileQueue { margin-top: 14px; background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 6px; padding: 8px; max-height: 150px; overflow-y: auto; }
    .queue-item { display: flex; justify-content: space-between; padding: 6px 4px; border-bottom: 1px solid #f1f5f9; font-size: 13px; }
    .queue-item:last-child { border-bottom: none; }
    .queue-name { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 70%; font-weight: 500; color: #334155; }
  </style>
</head>
<body>
  <div class="card">
    <h2>Media Converter &amp; Compressor &mdash; Cloud Batch Processing</h2>
    <div style="display:flex; gap:24px; margin-top:18px;">
      <div style="flex:1">
        <label class="block" style="font-weight:600; color:#475569; margin-bottom:6px; display:block;">1. Select Videos</label>
        <div id="dropzone" class="drop">
          <input id="fileInput" type="file" accept="video/*" multiple class="hidden">
          <div style="color:#64748b;">Click to browse or drag multiple files here</div>
        </div>

        <div id="fileQueue" class="hidden"></div>

        <div style="margin-top:20px">
          <label style="font-weight:600; color:#475569; display:block;">2. Compression Settings</label>
          <div style="display:flex; gap:12px; margin-top:6px;">
            <div style="flex:1">
              <label style="font-size:13px; color:#64748b;">Target Size (MB)</label>
              <input id="targetMB" type="number" value="50" style="width:100%; padding:8px; margin-top:4px; border:1px solid #cbd5e1; border-radius:6px;">
            </div>
            <div style="flex:1">
              <label style="font-size:13px; color:#64748b;">Max Resolution</label>
              <select id="resSelect" style="width:100%; padding:8px; margin-top:4px; border:1px solid #cbd5e1; border-radius:6px;">
                <option value="720">720p (Better quality)</option>
                <option value="480" selected>480p (Fastest)</option>
                <option value="360">360p (Smallest)</option>
              </select>
            </div>
          </div>
        </div>

        <!-- Smart suggestion banner — shown/updated by JS when files + target size are set -->
        <div id="suggestionBox" style="display:none; margin-top:16px; padding:12px 14px; background:#eff6ff; border:1px solid #bfdbfe; border-radius:8px; font-size:13px; color:#1e40af;">
          <div style="font-weight:600; margin-bottom:6px;">&#x1f9e0; Smart Suggestion</div>
          <div id="suggestionText" style="line-height:1.6; color:#334155;"></div>
          <button id="applyBtn" style="margin-top:10px; padding:5px 14px; border-radius:6px; background:#2563eb; color:#fff; border:none; cursor:pointer; font-size:12px; font-weight:600;">Apply Suggested Settings</button>
        </div>

        <div style="margin-top:24px">
          <button id="startBtn" class="btn" style="width:100%; padding:12px; font-size:15px;" disabled>Start Batch Compression</button>
        </div>
      </div>

      <div style="width:380px">
        <label style="font-weight:600; color:#475569;">Live Progress</label>
        <div class="progressWrap" style="margin-top:6px">
          <div id="progressBar" class="progress"></div>
        </div>
        <div id="progressText" style="text-align:right; font-size:13px; margin-top:6px; font-weight:600; color:#2563eb;">0%</div>
        <div id="etaText" style="text-align:right; font-size:12px; color:#64748b; margin-top:2px;">Waiting for files...</div>

        <div style="margin-top:16px">
          <label style="font-weight:600; color:#475569;">System Terminal</label>
          <div id="log" class="terminal" style="margin-top:6px;"></div>
          <button id="clearLog" style="margin-top:8px; padding:6px 12px; border-radius:6px; background:#1e293b; color:#fff; border:none; cursor:pointer; font-size:12px;">Clear Logs</button>
        </div>
      </div>
    </div>
  </div>

  <script>
  const $ = s => document.querySelector(s);
  const logEl = $('#log'), startBtn = $('#startBtn'),
        fileInput = $('#fileInput'), dropzone = $('#dropzone'), fileQueueEl = $('#fileQueue'),
        progressBar = $('#progressBar'), progressText = $('#progressText'), etaText = $('#etaText'),
        targetMBInput = $('#targetMB'), resSelect = $('#resSelect');

  const BASE_URL = "https://sunnyzzaman-media-compressor-backend.hf.space";
  let selectedFiles = [];

  function log(msg, cls='log-info') {
    const time = new Date().toLocaleTimeString();
    const d = document.createElement('div');
    d.className = cls;
    d.textContent = `[${time}] ${msg}`;
    logEl.appendChild(d);
    logEl.scrollTop = logEl.scrollHeight;
  }

  $('#clearLog').addEventListener('click', () => logEl.innerHTML = '');
  dropzone.addEventListener('click', () => fileInput.click());
  dropzone.addEventListener('dragover', e => { e.preventDefault(); dropzone.style.borderColor = '#2563eb'; });
  dropzone.addEventListener('dragleave', () => { dropzone.style.borderColor = ''; });
  dropzone.addEventListener('drop', e => {
    e.preventDefault();
    dropzone.style.borderColor = '';
    if (e.dataTransfer.files?.length) handleFiles(e.dataTransfer.files);
  });
  fileInput.addEventListener('change', e => {
    if (e.target.files?.length) handleFiles(e.target.files);
  });

  function handleFiles(files) {
    let addedCount = 0;
    for (let i = 0; i < files.length; i++) {
      if (files[i].type.startsWith('video/')) {
        selectedFiles.push({ file: files[i], status: 'Queued', downloadUrl: null });
        addedCount++;
      } else {
        log(`Skipped ${files[i].name} (Not a valid video)`, 'log-error');
      }
    }
    if (addedCount > 0) {
      log(`Added ${addedCount} file(s) to the queue.`);
      fileQueueEl.classList.remove('hidden');
      startBtn.disabled = false;
      renderQueue();
    }
  }

  function renderQueue() {
    fileQueueEl.innerHTML = '';
    selectedFiles.forEach(item => {
      let statusHtml = '';
      if (item.status === 'Done' && item.downloadUrl) {
        statusHtml = `<a href="${item.downloadUrl}" download="compressed_${item.file.name.replace(/[^a-zA-Z0-9 .\-_]/g, '')}" style="color:#10b981; font-weight:600; text-decoration:underline; cursor:pointer;">Download</a>`;
      } else {
        let statusColor = '#64748b';
        if (item.status === 'Uploading...' || item.status === 'Cooking...') statusColor = '#2563eb';
        if (item.status.includes('Error')) statusColor = '#ef4444';
        statusHtml = `<span style="font-weight:600; color:${statusColor}">${item.status}</span>`;
      }
      const div = document.createElement('div');
      div.className = 'queue-item';
      div.innerHTML = `<span class="queue-name" title="${item.file.name}">${item.file.name}</span>${statusHtml}`;
      fileQueueEl.appendChild(div);
    });

    // Call suggestion logic directly here — avoids the hoisting/infinite-loop bug
    // that occurs when trying to patch renderQueue from outside with a wrapper function.
    updateSuggestion();
  }

  startBtn.addEventListener('click', async () => {
    startBtn.disabled = true;

    for (let i = 0; i < selectedFiles.length; i++) {
      if (selectedFiles[i].status === 'Done' || selectedFiles[i].status.includes('Error')) continue;

      const currentFile = selectedFiles[i].file;
      selectedFiles[i].status = 'Uploading...';
      renderQueue();
      log(`--- Processing File ${i + 1} of ${selectedFiles.length}: ${currentFile.name} ---`);
      etaText.textContent = `File ${i + 1}/${selectedFiles.length}: Initialising job...`;
      progressBar.style.width = '0%';
      progressText.textContent = '0%';

      const jobId = Math.random().toString(36).substring(2, 15);
      const CHUNK_SIZE = 5 * 1024 * 1024;
      const totalChunks = Math.ceil(currentFile.size / CHUNK_SIZE);

      // Step 1: Wake up HF space + register job
      try {
        const initData = new FormData();
        initData.append('job_id', jobId);
        await fetch(`${BASE_URL}/health`).catch(() => console.log("Health ping failed, moving on"));
        const initRes = await fetch(`${BASE_URL}/init_job/`, { method: 'POST', body: initData });
        if (!initRes.ok) {
          const body = await initRes.text();
          throw new Error(`HTTP ${initRes.status}: ${body}`);
        }
        log(`Job initialised (${totalChunks} chunk${totalChunks > 1 ? 's' : ''} to upload)`);
      } catch (err) {
        log(`Failed to initialise job: ${err.message}`, 'log-error');
        selectedFiles[i].status = 'Error: Init Failed';
        renderQueue();
        continue;
      }

      // Step 2: Upload chunks
      let uploadFailed = false;
      for (let c = 0; c < totalChunks; c++) {
        const start = c * CHUNK_SIZE;
        const end = Math.min(start + CHUNK_SIZE, currentFile.size);
        const chunk = currentFile.slice(start, end);
        const formData = new FormData();
        formData.append('file', chunk);
        formData.append('job_id', jobId);
        formData.append('chunk_index', c);
        formData.append('total_chunks', totalChunks);
        try {
          const response = await fetch(`${BASE_URL}/upload_chunk/`, { method: 'POST', body: formData });
          if (!response.ok) {
            const body = await response.text();
            throw new Error(`HTTP ${response.status}: ${body}`);
          }
          const percentComplete = Math.round(((c + 1) / totalChunks) * 50);
          progressBar.style.width = percentComplete + '%';
          progressText.textContent = percentComplete + '%';
          etaText.textContent = `File ${i + 1}/${selectedFiles.length}: Chunk ${c + 1}/${totalChunks} uploaded`;
        } catch (err) {
          log(`Failed to upload chunk ${c + 1}/${totalChunks}: ${err.message}`, 'log-error');
          selectedFiles[i].status = 'Error: Upload Failed';
          renderQueue();
          uploadFailed = true;
          break;
        }
      }

      if (uploadFailed) continue;

      // Step 3: Start compression
      selectedFiles[i].status = 'Cooking...';
      renderQueue();
      log(`All chunks uploaded! Starting compression for ${currentFile.name}...`);
      etaText.textContent = `File ${i + 1}/${selectedFiles.length}: Processing on server...`;
      progressBar.style.width = '75%';
      progressText.textContent = 'Cooking...';

      const compressData = new FormData();
      compressData.append('job_id', jobId);
      compressData.append('original_name', currentFile.name);
      compressData.append('target_mb', targetMBInput.value);
      compressData.append('resolution', resSelect.value);

      try {
        const startRes = await fetch(`${BASE_URL}/start_compress/`, { method: 'POST', body: compressData });
        if (!startRes.ok) {
          const body = await startRes.text();
          throw new Error(`HTTP ${startRes.status}: ${body}`);
        }

        // Step 4: Poll for completion
        await new Promise((resolve) => {
          const pollInterval = setInterval(async () => {
            try {
              const statusRes = await fetch(`${BASE_URL}/status/${jobId}`);
              const statusData = await statusRes.json();
              if (statusData.status === 'processing') {
                // still running
              } else if (statusData.status === 'done') {
                clearInterval(pollInterval);
                const outMB = statusData.output_size_mb ? ` (${statusData.output_size_mb} MB)` : '';
                log(`Compression complete for ${currentFile.name}${outMB}!`, 'log-success');
                progressBar.style.width = '100%';
                progressText.textContent = '100%';
                selectedFiles[i].status = 'Done';
                selectedFiles[i].downloadUrl = `${BASE_URL}/download/${jobId}`;
                renderQueue();
                const a = document.createElement('a');
                a.href = selectedFiles[i].downloadUrl;
                a.download = `compressed_${currentFile.name.replace(/[^a-zA-Z0-9 .\-_]/g, '')}`;
                a.click();
                resolve();
              } else if (statusData.status === 'error') {
                clearInterval(pollInterval);
                log(`Server error: ${statusData.message}`, 'log-error');
                selectedFiles[i].status = 'Error: Server Crash';
                renderQueue();
                resolve();
              }
            } catch (pollErr) {
              console.warn('Polling paused, reconnecting...');
            }
          }, 5000);
        });

      } catch (err) {
        log(`Network error while starting ${currentFile.name}: ${err.message}`, 'log-error');
        selectedFiles[i].status = 'Error: Network';
        renderQueue();
      }
    }

    log('--- All queued jobs complete! ---', 'log-success');
    etaText.textContent = 'Batch Processing Finished.';
    startBtn.disabled = false;
  });

  // Smart suggestion logic
  let suggestedResolution = '480';

  function updateSuggestion() {
    if (selectedFiles.length === 0) {
      document.getElementById('suggestionBox').style.display = 'none';
      return;
    }
    const totalOriginalMB = selectedFiles.reduce((sum, f) => sum + f.file.size / (1024 * 1024), 0);
    const targetMB = parseFloat(targetMBInput.value) || 50;
    const ratio = targetMB / totalOriginalMB;
    let resolution, label, reasoning;
    if (ratio >= 0.85) {
      resolution = '720';
      label      = 'Light compression (keeping most quality)';
      reasoning  = `You're compressing to ${Math.round(ratio * 100)}% of the original. 720p is recommended to preserve visual quality.`;
    } else if (ratio >= 0.5) {
      resolution = '480';
      label      = 'Balanced compression';
      reasoning  = `You're compressing to ${Math.round(ratio * 100)}% of the original. 480p gives a good balance of quality vs file size for meeting recordings.`;
    } else if (ratio >= 0.25) {
      resolution = '360';
      label      = 'Heavy compression';
      reasoning  = `You're compressing to ${Math.round(ratio * 100)}% of the original. 360p is recommended — at this bitrate higher resolutions won't look better anyway.`;
    } else {
      resolution = '360';
      label      = 'Very aggressive compression';
      reasoning  = `You're targeting ${Math.round(ratio * 100)}% of the original size. Quality will be noticeably degraded. Consider a slightly higher target size.`;
    }
    suggestedResolution = resolution;
    const currentRes = resSelect.value;
    const resLabel   = { '720': '720p', '480': '480p', '360': '360p' };
    const alreadyMatch = currentRes === resolution;
    document.getElementById('suggestionText').innerHTML =
      `<strong>${label}</strong><br>${reasoning}`
      + (alreadyMatch
        ? `<br><span style="color:#16a34a">&#x2713; Your current resolution (${resLabel[currentRes]}) matches the suggestion.</span>`
        : `<br>Suggested resolution: <strong>${resLabel[resolution]}</strong> (currently ${resLabel[currentRes] || currentRes})`);
    document.getElementById('suggestionBox').style.display = 'block';
  }

  document.getElementById('applyBtn').addEventListener('click', () => {
    if (suggestedResolution) resSelect.value = suggestedResolution;
    updateSuggestion();
  });

  targetMBInput.addEventListener('input', updateSuggestion);
  resSelect.addEventListener('change', updateSuggestion);
  </script>
</body>
</html>
