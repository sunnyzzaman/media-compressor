<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Media Converter & Compressor (SaaS Hybrid)</title>
  <style>
    body { font-family: system-ui, Segoe UI, Helvetica, Arial; background: #f3f4f6; margin: 24px; }
    .card { max-width: 920px; margin: 0 auto; background: #fff; padding: 20px; border-radius: 12px; box-shadow: 0 6px 18px rgba(15,23,42,.06); }
    .drop { border: 2px dashed #cbd5e1; padding: 30px; text-align: center; border-radius: 8px; cursor: pointer; background: #fbfdff; }
    .terminal { background: #071020; color: #cbd5e1; padding: 12px; border-radius: 8px; max-height: 240px; overflow: auto; font-family: monospace; }
    .btn { padding: 10px 18px; border-radius: 8px; border: none; background: #2563eb; color: white; cursor: pointer; }
    .btn:disabled { background: #94a3b8; cursor: not-allowed; }
    .hidden { display: none; }
    .progressWrap { height: 10px; background: #e6eefc; border-radius: 6px; overflow: hidden; }
    .progress { height: 100%; width: 0; background: #2563eb; transition: width .2s; }
    .log-info { color: #7dd3fc; }
    .log-error { color: #ff7675; }
    .log-success { color: #86efac; }
  </style>
</head>
<body>
  <div class="card">
    <h2>Media Converter & Compressor — Cloud Powered</h2>
    <div style="display:flex; gap:18px; margin-top:18px;">
      <div style="flex:1">
        <label class="block">Drop a Video File (.mp4, .mov, .webm)</label>
        <div id="dropzone" class="drop">
          <input id="fileInput" type="file" accept="video/*" class="hidden">
          <div>Click to browse or drag file here</div>
          <div id="fileName" class="hidden" style="margin-top:8px; color:#2563eb; font-weight:600;"></div>
        </div>

        <div style="margin-top:14px">
          <button id="startBtn" class="btn" disabled>Start Cloud Compression</button>
          <button id="downloadBtn" class="btn" style="background:#10b981; margin-left:10px;" hidden>Download Compressed File</button>
        </div>
      </div>

      <div style="width:360px">
        <label>Progress</label>
        <div class="progressWrap" style="margin-top:6px">
          <div id="progressBar" class="progress"></div>
        </div>
        <div id="progressText" style="text-align:right; font-size:13px; margin-top:6px;">0%</div>
        <div id="etaText" style="text-align:right; font-size:12px; color:#64748b; margin-top:2px;">Ready.</div>

        <div style="margin-top:10px">
          <label>Terminal Log</label>
          <div id="log" class="terminal"></div>
          <button id="clearLog" style="margin-top:8px; padding:6px 10px; border-radius:6px; background:#111827; color:#fff; border:none;">Clear</button>
        </div>
      </div>
    </div>
  </div>

  <script>
  const $ = s => document.querySelector(s);
  const logEl = $('#log'), startBtn = $('#startBtn'), downloadBtn = $('#downloadBtn'),
        fileInput = $('#fileInput'), dropzone = $('#dropzone'), fileNameEl = $('#fileName'),
        progressBar = $('#progressBar'), progressText = $('#progressText'), etaText = $('#etaText');

  // The hidden URL to your Hugging Face Space
  const API_URL = "https://sunnyzzaman-media-compressor-backend.hf.space/compress/";
  let selectedFile = null, outputUrl = null;

  function log(msg, cls='log-info') {
    const time = new Date().toLocaleTimeString();
    const d = document.createElement('div');
    d.className = cls;
    d.textContent = `[${time}] ${msg}`;
    logEl.appendChild(d);
    logEl.scrollTop = logEl.scrollHeight;
  }

  $('#clearLog').addEventListener('click', ()=> logEl.innerHTML = '');
  dropzone.addEventListener('click', ()=> fileInput.click());
  dropzone.addEventListener('dragover', e => { e.preventDefault(); dropzone.style.borderColor='#2563eb'; });
  dropzone.addEventListener('dragleave', e => { dropzone.style.borderColor=''; });
  dropzone.addEventListener('drop', e => { e.preventDefault(); if(e.dataTransfer.files?.length) handleFile(e.dataTransfer.files[0]); });
  fileInput.addEventListener('change', e => { if(e.target.files?.length) handleFile(e.target.files[0]); });

  function handleFile(file){
    if(!file.type.startsWith('video/')){ log('Please select a valid video file.', 'log-error'); return; }
    selectedFile = file;
    fileNameEl.textContent = `${file.name} (${(file.size/1024/1024).toFixed(2)} MB)`;
    fileNameEl.classList.remove('hidden');
    startBtn.disabled = false;
    downloadBtn.hidden = true;
    log(`Selected: ${file.name}`);
  }

  startBtn.addEventListener('click', () => {
    if (!selectedFile) return;
    
    startBtn.disabled = true;
    downloadBtn.hidden = true;
    if (outputUrl) { URL.revokeObjectURL(outputUrl); outputUrl = null; }
    
    progressBar.style.width = '0%';
    progressText.textContent = '0%';
    etaText.textContent = 'Uploading to server...';
    log('Sending file to the cloud kitchen...', 'log-info');

    const formData = new FormData();
    formData.append('file', selectedFile);

    // We use XMLHttpRequest here instead of fetch() so we can track the upload progress
    const xhr = new XMLHttpRequest();
    xhr.open('POST', API_URL, true);
    xhr.responseType = 'blob'; // We expect a video file back

    // Track the upload phase
    xhr.upload.onprogress = (e) => {
      if (e.lengthComputable) {
        // Upload is roughly the first 50% of the total time
        const percentComplete = Math.round((e.loaded / e.total) * 50);
        progressBar.style.width = percentComplete + '%';
        progressText.textContent = percentComplete + '%';
      }
    };

    xhr.upload.onload = () => {
      log('Upload complete. Server is now compressing the video natively...', 'log-info');
      etaText.textContent = 'Processing... (This usually takes a few minutes)';
      progressBar.style.width = '75%'; // Fake progress while we wait for the server
      progressText.textContent = 'Cooking...';
    };

    // When the server finishes cooking and sends the file back
    xhr.onload = () => {
      if (xhr.status === 200) {
        log('Compression complete! Preparing download...', 'log-success');
        progressBar.style.width = '100%';
        progressText.textContent = '100%';
        etaText.textContent = 'Done!';

        // Create a local link for the downloaded file
        const blob = xhr.response;
        outputUrl = URL.createObjectURL(blob);
        
        downloadBtn.hidden = false;
        downloadBtn.onclick = () => {
          const a = document.createElement('a');
          a.href = outputUrl;
          a.download = `compressed_${selectedFile.name}`;
          a.click();
        };
      } else {
        log(`Server error: Status ${xhr.status}. The file may be too large.`, 'log-error');
        etaText.textContent = 'Failed.';
      }
      startBtn.disabled = false;
    };

    xhr.onerror = () => {
      log('Network error occurred. The server might be asleep, try again in 1 minute.', 'log-error');
      startBtn.disabled = false;
    };

    xhr.send(formData);
  });
  </script>
</body>
</html>
